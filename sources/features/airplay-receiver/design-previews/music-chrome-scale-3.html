<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AirPlay Chrome — 3 Adaptive Designs (DPI / vmin)</title>
<style>
  :root {
    --bg: #0b0c10;
    --ink: #f3f1ea;
    --muted: #8b8994;
    --line: rgba(255,255,255,0.08);
    /* Ava DetailOverlayMetrics: scale = clamp(vmin/360, 0.9, 1.28) */
    --vmin: 360;
    --scale: 1;
    --text-scale: 1;
    --title: calc(32px * var(--text-scale));
    --artist: calc(18px * var(--text-scale));
    --play: calc(76px * var(--scale));
    --skip: calc(40px * var(--scale));
    --gap-meta: calc(16px * var(--scale));
    --gap-transport: calc(36px * var(--scale));
    --pad-h: calc(44px * var(--scale));
    --capsule-pad-y: calc(14px * var(--scale));
    --capsule-pad-x: calc(26px * var(--scale));
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%;
    background:
      radial-gradient(1000px 520px at 8% -8%, #1a2433 0%, transparent 55%),
      radial-gradient(800px 420px at 92% 0%, #2a1c14 0%, transparent 50%),
      var(--bg);
    color: var(--ink);
    font-family: "Avenir Next", "Segoe UI", "PingFang SC", sans-serif;
  }
  header { max-width: 1600px; margin: 0 auto; padding: 28px 36px 8px; }
  header h1 { margin: 0 0 8px; font-size: 26px; font-weight: 650; letter-spacing: -0.03em; }
  header p { margin: 0; color: var(--muted); font-size: 13.5px; line-height: 1.55; max-width: 820px; }
  .toolbar {
    max-width: 1600px; margin: 16px auto 0; padding: 0 36px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .seg {
    display: inline-flex; background: rgba(255,255,255,0.04);
    border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
  }
  .seg button {
    border: 0; background: transparent; color: var(--muted);
    padding: 9px 13px; font-size: 12px; font-weight: 650; cursor: pointer;
  }
  .seg button.active { background: #f2f0ea; color: #12131a; }
  .scale-pill {
    font-size: 12px; color: var(--muted);
    padding: 8px 12px; border-radius: 10px;
    border: 1px solid var(--line); background: rgba(255,255,255,0.03);
  }
  .scale-pill strong { color: #e8e2d4; font-weight: 650; }

  .stack { max-width: 1600px; margin: 0 auto; padding: 20px 36px 56px; display: flex; flex-direction: column; gap: 26px; }
  .card {
    background: linear-gradient(180deg, #191c25, #11131a);
    border: 1px solid var(--line); border-radius: 22px; padding: 18px 18px 20px;
  }
  .card.selected { border-color: rgba(255,255,255,0.35); box-shadow: 0 0 0 1px rgba(255,255,255,0.16); }
  .card-head { display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
  .name { font-size: 17px; font-weight: 650; letter-spacing: -0.02em; }
  .tag { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #c9c2b3; font-weight: 650; margin-top: 4px; }
  .blurb { margin: 10px 0 0; font-size: 12.5px; line-height: 1.5; color: var(--muted); max-width: 640px; }
  .formula {
    margin-top: 8px; font-size: 11px; color: #9a968c;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .pick {
    border: 1px solid var(--line); background: rgba(255,255,255,0.04); color: var(--ink);
    border-radius: 12px; padding: 11px 16px; font-size: 13px; font-weight: 650; cursor: pointer; white-space: nowrap;
  }
  .card.selected .pick { background: #f2f0ea; color: #12131a; border-color: transparent; }

  .duo {
    display: grid;
    grid-template-columns: minmax(220px, var(--phone-w)) minmax(360px, 1fr);
    gap: 20px; align-items: center; margin-top: 16px;
  }
  body.mode-portrait .duo, body.mode-landscape .duo { grid-template-columns: 1fr; justify-items: center; }
  body.mode-portrait .land, body.mode-landscape .port { display: none; }
  .frame-label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 650; margin-bottom: 8px; }

  .phone {
    position: relative; border-radius: 26px; overflow: hidden; background: #111;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .phone.portrait { width: var(--phone-w); aspect-ratio: 9 / 17.5; }
  .phone.landscape { width: min(100%, var(--phone-l-w)); aspect-ratio: 17.5 / 9; }
  .cover {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.2), transparent 30%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.92) 100%),
      url("./cover.jpg") center / cover no-repeat;
    filter: saturate(0.92) contrast(1.05);
  }
  .phone.landscape .cover {
    background:
      linear-gradient(90deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.18) 45%, rgba(0,0,0,0.75) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.15), transparent 45%, rgba(0,0,0,0.5)),
      url("./cover.jpg") center / cover no-repeat;
  }
  .chrome {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; justify-content: center; align-items: stretch;
    padding: 0 var(--pad-h) 8%;
  }
  .phone.landscape .chrome {
    padding: 0 6% 0 46%;
    justify-content: center;
  }
  .title, .artist {
    margin: 0; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .phone.landscape .title, .phone.landscape .artist { text-align: left; }
  .transport { display: flex; align-items: center; justify-content: center; gap: calc(22px * var(--scale)); margin-top: var(--gap-transport); }
  .phone.landscape .transport { justify-content: flex-start; }
  .icon-btn, .play-btn {
    border: 0; background: transparent; color: #fff; display: grid; place-items: center; cursor: pointer;
    transition: transform .16s ease;
  }
  .icon-btn:active, .play-btn:active { transform: scale(0.94); }
  .icon-btn svg, .play-btn svg { width: 55%; height: 55%; display: block; }

  /* ===== F · Scaled Cinema ===== */
  .f .title {
    font-size: var(--title); font-weight: 700; letter-spacing: -0.035em;
    text-shadow: 0 4px 22px rgba(0,0,0,0.55);
  }
  .f .artist {
    margin-top: var(--gap-meta); font-size: var(--artist); font-weight: 500;
    color: rgba(255,255,255,0.64); letter-spacing: 0.01em;
  }
  .f .icon-btn { width: var(--skip); height: var(--skip); color: rgba(255,255,255,0.9); }
  .f .play-btn {
    width: var(--play); height: var(--play); border-radius: 999px;
    background: #fff; color: #111;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .f .play-btn svg { width: 46%; height: 46%; }

  /* ===== G · Large Aura Capsule ===== */
  .g .title {
    font-size: calc(30px * var(--text-scale)); font-weight: 650; letter-spacing: -0.025em;
    text-shadow: 0 3px 18px rgba(0,0,0,0.5);
  }
  .g .artist {
    margin-top: calc(14px * var(--scale));
    font-size: calc(14px * var(--text-scale)); font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.58);
  }
  .g .transport {
    margin-top: calc(34px * var(--scale));
    padding: var(--capsule-pad-y) var(--capsule-pad-x);
    gap: calc(16px * var(--scale));
    border-radius: 999px;
    background: rgba(16,18,24,0.5);
    border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(20px) saturate(1.25);
    -webkit-backdrop-filter: blur(20px) saturate(1.25);
    box-shadow: 0 18px 44px rgba(0,0,0,0.35);
    width: max-content;
    align-self: center;
  }
  .g.landscape .transport { align-self: flex-start; }
  .g .icon-btn {
    width: calc(48px * var(--scale)); height: calc(48px * var(--scale));
    color: rgba(255,255,255,0.92);
  }
  .g .play-btn {
    width: calc(64px * var(--scale)); height: calc(64px * var(--scale));
    border-radius: 999px; background: rgba(255,255,255,0.96); color: #141414;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .g .play-btn svg { width: 44%; height: 44%; }

  /* ===== H · Stage Hero ===== */
  .h .title {
    font-size: calc(34px * var(--text-scale)); font-weight: 600; letter-spacing: -0.04em;
    text-shadow: 0 6px 28px rgba(0,0,0,0.55);
  }
  .h .artist {
    margin-top: calc(18px * var(--scale));
    font-size: calc(17px * var(--text-scale)); font-weight: 500;
    color: rgba(255,255,255,0.7); letter-spacing: 0.02em;
  }
  .h .transport { margin-top: calc(44px * var(--scale)); gap: calc(28px * var(--scale)); }
  .h .icon-btn {
    width: calc(56px * var(--scale)); height: calc(56px * var(--scale));
    border-radius: 999px; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.92);
  }
  .h .play-btn {
    width: calc(88px * var(--scale)); height: calc(88px * var(--scale));
    border-radius: 999px; background: #fff; color: #0f0f12;
    box-shadow: 0 18px 48px rgba(0,0,0,0.45);
  }
  .h .play-btn svg { width: 42%; height: 42%; }

  footer { max-width: 1600px; margin: 0 auto; padding: 0 36px 48px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body class="mode-both">
  <header>
    <h1>3 套自适应方案 · 按屏幕 vmin / DPI 放大</h1>
    <p>
      参考 Ava <code>DetailOverlayMetrics</code>：
      <code>scale = clamp(vmin/360, 0.9, 1.28)</code>，横屏再乘 textBoost。
      上一版 B 偏小（歌名 27 / 歌手 13 / 播放 56）；这三套默认更大，并随机型缩放。
    </p>
  </header>

  <div class="toolbar">
    <div class="seg" id="deviceSeg">
      <button type="button" data-device="compact">小屏 320dp</button>
      <button type="button" data-device="mi9" class="active">MI 9 · 393dp</button>
      <button type="button" data-device="large">大屏 440dp</button>
    </div>
    <div class="seg" id="modeSeg">
      <button type="button" data-mode="both" class="active">横竖对照</button>
      <button type="button" data-mode="portrait">竖屏</button>
      <button type="button" data-mode="landscape">横屏</button>
    </div>
    <div class="scale-pill" id="scaleInfo">scale —</div>
  </div>

  <div class="stack" id="stack"></div>
  <footer>选 F / G / H 后告诉我；落地时会用同一套 vmin 公式写进 Java Overlay。</footer>

<script>
const DEVICES = {
  compact: { vmin: 320, phoneW: 260, phoneLW: 520, label: "320dp" },
  mi9:     { vmin: 393, phoneW: 300, phoneLW: 620, label: "MI 9 ≈393dp" },
  large:   { vmin: 440, phoneW: 320, phoneLW: 680, label: "440dp" },
};

const ICONS = {
  prev: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>',
  next: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>',
  pause: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>',
};

const DESIGNS = [
  {
    id: "F",
    name: "F · Scaled Cinema",
    tag: "Ava-sized solid",
    blurb: "最接近主机尺寸：歌名≈32sp、歌手≈18sp、播放键≈76dp，全部跟 vmin 缩放。干净白实心键，不再偏小。",
    formula: "title=32×textScale  artist=18×textScale  play=76×scale  skip=40×scale",
  },
  {
    id: "G",
    name: "G · Large Aura Capsule",
    tag: "Glass, but bigger",
    blurb: "保留毛玻璃胶囊，但整体加大一档：播放≈64×scale、跳过≈48×scale；歌手大写但仍可读（约14–18sp），不再像 13sp 细线。",
    formula: "capsule pad 14/26×scale  play=64×scale  title=30×textScale",
  },
  {
    id: "H",
    name: "H · Stage Hero",
    tag: "Bold stage",
    blurb: "舞台感：超大歌名（≈34sp）+ 超大播放键（≈88×scale）；prev/next 用大号磨砂圆。适合封面氛围强的场景。",
    formula: "title=34×textScale  play=88×scale  skip circle=56×scale",
  },
];

function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

function applyDevice(key, landscapeBoost) {
  const d = DEVICES[key];
  const scale = clamp(d.vmin / 360, 0.9, 1.28);
  const textScale = scale * (landscapeBoost || 1);
  const root = document.documentElement;
  root.style.setProperty("--vmin", d.vmin);
  root.style.setProperty("--scale", scale.toFixed(3));
  root.style.setProperty("--text-scale", textScale.toFixed(3));
  root.style.setProperty("--phone-w", d.phoneW + "px");
  root.style.setProperty("--phone-l-w", d.phoneLW + "px");
  // Derive readable tokens (portrait base; landscape phones get slight boost via text-scale when mode=landscape-only we bump)
  root.style.setProperty("--title", (32 * textScale) + "px");
  root.style.setProperty("--artist", (18 * textScale) + "px");
  root.style.setProperty("--play", (76 * scale) + "px");
  root.style.setProperty("--skip", (40 * scale) + "px");
  root.style.setProperty("--gap-meta", (16 * scale) + "px");
  root.style.setProperty("--gap-transport", (36 * scale) + "px");
  root.style.setProperty("--pad-h", (44 * scale) + "px");
  root.style.setProperty("--capsule-pad-y", (14 * scale) + "px");
  root.style.setProperty("--capsule-pad-x", (26 * scale) + "px");

  document.getElementById("scaleInfo").innerHTML =
    "<strong>" + d.label + "</strong> · scale=" + scale.toFixed(2) +
    " · textScale=" + textScale.toFixed(2) +
    " · title≈" + Math.round(32 * textScale) + "px · play≈" + Math.round(76 * scale) + "px";
}

function chromeHTML(id, orient) {
  const cls = id.toLowerCase() + " " + orient;
  return `
    <div class="phone ${orient} ${cls}">
      <div class="cover"></div>
      <div class="chrome">
        <h2 class="title">Midnight City Lights</h2>
        <p class="artist">Nora Vale</p>
        <div class="transport">
          <button class="icon-btn" aria-label="prev">${ICONS.prev}</button>
          <button class="play-btn" aria-label="pause">${ICONS.pause}</button>
          <button class="icon-btn" aria-label="next">${ICONS.next}</button>
        </div>
      </div>
    </div>`;
}

function render() {
  const stack = document.getElementById("stack");
  stack.innerHTML = DESIGNS.map((d) => `
    <article class="card" data-id="${d.id}">
      <div class="card-head">
        <div>
          <div class="name">${d.name}</div>
          <div class="tag">${d.tag}</div>
          <p class="blurb">${d.blurb}</p>
          <div class="formula">${d.formula}</div>
        </div>
        <button class="pick" type="button">选用此方案</button>
      </div>
      <div class="duo">
        <div class="frame-wrap port">
          <div class="frame-label">Portrait</div>
          ${chromeHTML(d.id, "portrait")}
        </div>
        <div class="frame-wrap land">
          <div class="frame-label">Landscape</div>
          ${chromeHTML(d.id, "landscape")}
        </div>
      </div>
    </article>`).join("");

  stack.querySelectorAll(".card").forEach((card) => {
    card.querySelector(".pick").addEventListener("click", () => {
      stack.querySelectorAll(".card").forEach((c) => c.classList.remove("selected"));
      card.classList.add("selected");
      try { localStorage.setItem("airplay-chrome-scale-pick", card.dataset.id); } catch (_) {}
    });
  });
  try {
    const saved = localStorage.getItem("airplay-chrome-scale-pick");
    if (saved) {
      const card = stack.querySelector('.card[data-id="' + saved + '"]');
      if (card) card.querySelector(".pick").click();
    }
  } catch (_) {}
}

let device = "mi9";
function refreshScale() {
  const mode = document.body.className.replace("mode-", "");
  const boost = mode === "landscape" ? 1.06 : 1;
  applyDevice(device, boost);
}

document.getElementById("deviceSeg").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-device]");
  if (!btn) return;
  document.querySelectorAll("#deviceSeg button").forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  device = btn.dataset.device;
  refreshScale();
});

document.getElementById("modeSeg").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-mode]");
  if (!btn) return;
  document.querySelectorAll("#modeSeg button").forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  document.body.className = "mode-" + btn.dataset.mode;
  refreshScale();
});

render();
refreshScale();
</script>
</body>
</html>
